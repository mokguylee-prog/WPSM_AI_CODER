  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --user-bg: #1e2235;
      --claude-bg: #1a2520;
      --user-color: #7eb8f7;
      --claude-color: #5ecfa8;
      --text: #e2e8f0;
      --muted: #8892a4;
      --code-bg: #0d1117;
      --hr: #2a2d3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      padding: 0;
    }
    header {
      background: var(--surface);

      padding: 16px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;

      color: var(--text);

      margin-left: auto;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .message {
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .message-header {
      padding: 10px 20px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .message.user .message-header {
      background: var(--user-bg);
      color: var(--user-color);
      border-bottom: 1px solid var(--border);
    }
    .message.claude .message-header {
      background: var(--claude-bg);
      color: var(--claude-color);
      border-bottom: 1px solid var(--border);
    }
    .message-body {
      padding: 20px 24px;
      background: var(--surface);
    }
    .message.user .message-body { background: #171b2e; }
    .message.claude .message-body { background: #141c1a; }
    .message-body p { margin-bottom: 12px; }
    .message-body p:last-child { margin-bottom: 0; }
    .message-body h1, .message-body h2, .message-body h3 {
      color: var(--text);
      margin: 16px 0 8px;
      font-weight: 600;
    }
    .message-body h1 { font-size: 1.4rem; }
    .message-body h2 { font-size: 1.2rem; }
    .message-body h3 { font-size: 1rem; }
    .message-body code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85em;
      color: #f97316;
    }
    .message-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .message-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.875rem;
    }
    .message-body ul, .message-body ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }
    .message-body li { margin-bottom: 4px; }
    .message-body blockquote {
      border-left: 3px solid var(--border);
      padding-left: 16px;
      color: var(--muted);
      margin: 12px 0;
    }
    .message-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 0.9rem;
    }
    .message-body th, .message-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .message-body th { background: var(--bg); font-weight: 600; }
    .message-body a { color: #60a5fa; text-decoration: none; }
    .message-body a:hover { text-decoration: underline; }
    hr.separator {
      border: none;
      border-top: 1px solid var(--hr);
      margin: 24px 0;
    }
    .tool-block {
      background: #0f1823;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 8px 0;
      font-size: 0.8rem;
      color: #64b5f6;
      font-family: monospace;
    }
    .tool-block .tool-label {
      color: #42a5f5;
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
