    .message.claude .message-header{background:var(--claude-bg);color:var(--claude-color);border-bottom:1px solid var(--border)}

    .message.user .message-body{background:#171b2e}

    .message-body p{margin-bottom:12px}
    .message-body p:last-child{margin-bottom:0}
    .message-body h1,.message-body h2,.message-body h3{color:var(--text);margin:16px 0 8px;font-weight:600}
    .message-body h1{font-size:1.4rem} .message-body h2{font-size:1.2rem} .message-body h3{font-size:1rem}
    .message-body code{background:var(--code-bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'Fira Code',monospace;font-size:.85em;color:#f97316}
    .message-body pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;margin:12px 0}
    .message-body pre code{background:none;border:none;padding:0;color:#e2e8f0;font-size:.875rem}
    .message-body ul,.message-body ol{padding-left:20px;margin-bottom:12px}
    .message-body li{margin-bottom:4px}
    .message-body blockquote{border-left:3px solid var(--border);padding-left:16px;color:var(--muted);margin:12px 0}
    .message-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:.9rem}
    .message-body th,.message-body td{border:1px solid var(--border);padding:8px 12px;text-align:left}
    .message-body th{background:var(--bg);font-weight:600}
    .message-body a{color:#60a5fa;text-decoration:none}
    hr.sep{border:none;border-top:1px solid var(--border);margin:24px 0}
